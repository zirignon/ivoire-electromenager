<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <title>Administration - Ivoire Électroménagers</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="logo.jpg" type="image/jpeg">
</head>

<body>
    <main class="admin-page">

        <!-- Connexion admin -->
        <section class="admin-login" id="adminLogin">
            <div class="admin-panel">
                <h1>Administration</h1>
                <p class="admin-product-meta">
                    Connectez-vous pour gérer les articles et les commandes.
                </p>

                <form onsubmit="loginAdmin(event)">
                    <div class="form-group">
                        <label for="adminEmail">Email admin</label>
                        <input id="adminEmail" type="email" autocomplete="email" required>
                    </div>

                    <div class="form-group">
                        <label for="adminPassword">Mot de passe</label>
                        <input id="adminPassword" type="password" autocomplete="current-password" required>
                    </div>

                    <button class="btn btn-primary btn-block" type="submit">
                        Se connecter
                    </button>

                    <p class="admin-message" id="loginMessage" aria-live="polite"></p>
                </form>
            </div>
        </section>

        <!-- Tableau de bord admin -->
        <section class="admin-section admin-dashboard" id="adminDashboard" hidden>
            <div class="container">

                <div class="admin-topbar">
                    <div>
                        <h1>Gestion des articles</h1>
                        <p>Ajoutez, affichez, masquez ou supprimez les produits du catalogue.</p>
                    </div>

                    <div class="admin-stats">
                        <div class="admin-stat-card">
                            <span class="admin-stat-number" id="adminProductsCount">0</span>
                            <span class="admin-stat-label">Produits</span>
                        </div>

                        <div class="admin-stat-card">
                            <span class="admin-stat-number" id="adminOrdersCount">0</span>
                            <span class="admin-stat-label">Commandes</span>
                        </div>
                    </div>

                    <div class="admin-topbar-actions">
                        <a class="btn btn-secondary" href="index.html">Voir le site</a>
                        <button class="btn btn-primary" type="button" onclick="logoutAdmin()">
                            Déconnexion
                        </button>
                    </div>
                </div>

                <div class="admin-panel">

                    <!-- Formulaire produit -->
                    <form class="admin-product-form" id="adminProductForm" onsubmit="addCustomProduct(event)">
                        <div class="admin-form-grid">
                            <div class="form-group">
                                <label for="adminProductName">Nom du produit *</label>
                                <input id="adminProductName" type="text" placeholder="Ex: Congélateur Hisense" required>
                            </div>

                            <div class="form-group">
                                <label for="adminProductPrice">Prix (FCFA) *</label>
                                <input id="adminProductPrice" type="number" placeholder="250000" min="0" required>
                            </div>

                            <div class="form-group">
                                <label for="adminProductCategory">Catégorie *</label>
                                <select id="adminProductCategory" required>
                                    <option value="">-- Sélectionnez --</option>
                                    <option value="refrigeration">Réfrigération</option>
                                    <option value="washing">Lavage</option>
                                    <option value="cooking">Cuisson</option>
                                    <option value="climate">Climatisation</option>
                                    <option value="other">Autre</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="adminProductImage">Image *</label>
                                <input id="adminProductImage" type="file" accept="image/*" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="adminProductDescription">Description *</label>
                            <textarea id="adminProductDescription" placeholder="Décrivez l'article..." required></textarea>
                        </div>

                        <div class="admin-actions">
                            <button class="btn btn-primary" type="submit">
                                Ajouter au catalogue
                            </button>

                            <button class="btn btn-secondary" type="reset">
                                Effacer
                            </button>
                        </div>

                        <p class="admin-message" id="adminMessage" aria-live="polite"></p>
                    </form>

                    <!-- Liste produits -->
                    <div class="admin-products-list" id="customProductsList"></div>

                    <hr class="admin-separator">

                    <!-- Commandes -->
                    <div class="admin-orders-section">
                        <div class="admin-orders-header">
                            <h2>Commandes enregistrées</h2>

                            <div class="admin-orders-tools">
                                <input
                                    id="orderSearchInput"
                                    class="admin-search-input"
                                    type="search"
                                    placeholder="Rechercher une commande..."
                                    oninput="filterOrders()"
                                >

                                <button class="btn btn-secondary" type="button" onclick="clearOrders()">
                                    Supprimer l'historique
                                </button>
                            </div>

                            <div class="admin-status-filters">
                                <button class="status-filter-btn active" type="button" data-status="all" onclick="filterOrdersByStatus('all', this)">
                                    Toutes
                                </button>

                                <button class="status-filter-btn" type="button" data-status="Nouvelle" onclick="filterOrdersByStatus('Nouvelle', this)">
                                    Nouvelle
                                </button>

                                <button class="status-filter-btn" type="button" data-status="En traitement" onclick="filterOrdersByStatus('En traitement', this)">
                                    En traitement
                                </button>

                                <button class="status-filter-btn" type="button" data-status="Livrée" onclick="filterOrdersByStatus('Livrée', this)">
                                    Livrée
                                </button>

                                <button class="status-filter-btn" type="button" data-status="Annulée" onclick="filterOrdersByStatus('Annulée', this)">
                                    Annulée
                                </button>
                            </div>
                        </div>

                        <div class="admin-orders-list" id="ordersList"></div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- Scripts externes -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paiementpro.net/webservice/onlinepayment/js/paiementpro.v1.0.1.js"></script>

    <!-- Script principal du site -->
    <script src="script.js?v=11></script>

    <!-- Script spécifique à la connexion admin -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateAdminView();
        });

        async function loginAdmin(e) {
            e.preventDefault();

            const emailInput = document.getElementById('adminEmail');
            const passwordInput = document.getElementById('adminPassword');
            const message = document.getElementById('loginMessage');

            if (!emailInput || !passwordInput || !message) {
                alert('Erreur : champs de connexion introuvables.');
                return;
            }

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            message.textContent = 'Connexion en cours...';
            message.style.color = '#555';

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    message.textContent = 'Email ou mot de passe incorrect.';
                    message.style.color = '#e74c3c';
                    return;
                }

                const isAdmin = await checkCurrentUserIsAdmin();

                if (!isAdmin) {
                    await supabaseClient.auth.signOut();

                    message.textContent = 'Accès refusé : ce compte n’est pas administrateur.';
                    message.style.color = '#e74c3c';
                    return;
                }

                message.textContent = '';
                passwordInput.value = '';

                await updateAdminView();
            } catch (error) {
                console.error('Erreur connexion admin:', error);
                message.textContent = 'Erreur de connexion.';
                message.style.color = '#e74c3c';
            }
        }

        async function logoutAdmin() {
            await supabaseClient.auth.signOut();

            const emailInput = document.getElementById('adminEmail');
            const passwordInput = document.getElementById('adminPassword');
            const loginMessage = document.getElementById('loginMessage');
            const adminMessage = document.getElementById('adminMessage');

            if (emailInput) {
                emailInput.value = '';
            }

            if (passwordInput) {
                passwordInput.value = '';
            }

            if (loginMessage) {
                loginMessage.textContent = '';
            }

            if (adminMessage) {
                adminMessage.textContent = '';
            }

            await updateAdminView();
        }

        async function updateAdminView() {
            const adminLogin = document.getElementById('adminLogin');
            const adminDashboard = document.getElementById('adminDashboard');

            if (!adminLogin || !adminDashboard) {
                console.error('Sections admin introuvables.');
                return;
            }

            const { data } = await supabaseClient.auth.getSession();
            const isLoggedIn = Boolean(data.session);

            if (!isLoggedIn) {
                adminLogin.hidden = false;
                adminLogin.style.display = 'flex';

                adminDashboard.hidden = true;
                adminDashboard.style.display = 'none';

                return;
            }

            const isAdmin = await checkCurrentUserIsAdmin();

            if (!isAdmin) {
                await supabaseClient.auth.signOut();

                adminLogin.hidden = false;
                adminLogin.style.display = 'flex';

                adminDashboard.hidden = true;
                adminDashboard.style.display = 'none';

                return;
            }

            adminLogin.hidden = true;
            adminLogin.style.display = 'none';

            adminDashboard.hidden = false;
            adminDashboard.style.display = 'block';

            if (typeof renderCustomProductsList === 'function') {
                await renderCustomProductsList();
            }

            if (typeof window.filterOrders === 'function') {
                await window.filterOrders();
            }

            if (typeof updateAdminStats === 'function') {
                await updateAdminStats();
            }
        }

        async function checkCurrentUserIsAdmin() {
            const { data: userData, error: userError } = await supabaseClient.auth.getUser();

            if (userError || !userData.user) {
                return false;
            }

            const { data, error } = await supabaseClient
                .from('admin_users')
                .select('id')
                .eq('user_id', userData.user.id)
                .maybeSingle();

            if (error) {
                console.error('Erreur vérification admin:', error);
                return false;
            }

            return Boolean(data);
        }
    </script>
</body>
</html>
