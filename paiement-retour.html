<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Retour de paiement - Ivoire Électroménagers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:#f5f5f5;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            margin:0;
        }
        .box{
            background:#fff;
            padding:24px 28px;
            border-radius:12px;
            max-width:420px;
            width:100%;
            box-shadow:0 8px 24px rgba(0,0,0,0.08);
            text-align:center;
        }
        h1{
            font-size:1.4rem;
            margin-bottom:8px;
            color:#004E89;
        }
        p{
            margin:6px 0;
            color:#555;
        }
        .btn{
            margin-top:16px;
            display:inline-block;
            padding:10px 18px;
            border-radius:8px;
            background:linear-gradient(135deg,#FF6B35,#F7931E);
            color:#fff;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>Merci pour votre paiement</h1>
    <p>Votre transaction a été prise en compte par notre partenaire PaiementPro.</p>
    <p>Vous recevrez une confirmation dès que le paiement sera validé.</p>
    <a class="btn" href="/">Retourner à la boutique</a>
</div>
</body>
</html>
